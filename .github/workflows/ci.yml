name: CI

on:
    push:
        branches: [main, master]
    pull_request:

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Prettier check
              run: npm run format:check

            - name: Unit tests
              run: npm run test

            - name: Production build
              run: npm run build
